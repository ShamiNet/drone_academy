name: drone_academy
description: "Drone Academy app for drone training, learning content, and student progress tracking."

# التطبيق خاص (غير منشور على pub.dev)
publish_to: 'none'

# إصدار التطبيق: صيغة الإصدار هي buildName+buildNumber
# يجب زيادة buildNumber عند كل رفع جديد للمتجر
version: 1.0.3

environment:
  sdk: ^3.9.0

# الحزم الأساسية التي يعتمد عليها التطبيق
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  collection: ^1.18.0

  # أيقونات iOS
  cupertino_icons: ^1.0.8
  firebase_core: ^4.1.1
  firebase_auth: ^6.1.0
  cloud_firestore: ^6.0.2
  pdf: ^3.11.3
  printing: ^5.14.2
  image_picker: ^1.2.0
  firebase_storage: ^13.0.2
  cloudinary_public: ^0.23.1
  shimmer: ^3.0.0
  firebase_messaging: ^16.0.2
  flutter_svg: ^2.2.1
  graphview:
  cloud_functions: ^6.0.3
  gal: ^2.3.2
  path_provider: ^2.1.5
  percent_indicator: ^4.2.5
  fl_chart: ^1.1.1
  url_launcher: ^6.3.2
  table_calendar: ^3.2.0
  google_generative_ai: ^0.4.7
  cached_network_image: ^3.4.1
  permission_handler: ^12.0.1
  cropperx: ^1.1.1
  share_plus: ^12.0.1
  shared_preferences: ^2.2.2
  animate_do: ^3.3.4
  font_awesome_flutter: ^10.12.0
  device_info_plus: ^9.0.0
  toastification: ^3.0.3
  package_info_plus: ^8.0.0
  translator: ^1.0.0
  # pdfx: ^2.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # قواعد تحليل وتحسين جودة الكود
  flutter_lints: ^5.0.0
  change_app_package_name: ^1.5.0
  # توليد أيقونة التطبيق
  flutter_launcher_icons: "^0.13.1"

flutter:
  generate: true

  # تفعيل أيقونات Material
  uses-material-design: true

  # ملفات المشروع (صور/خطوط/رسوم)
  assets:
  - assets/fonts/
  - assets/images/
  - assets/images/contact_qr.jpg
  - assets/illustrations/

  # الخطوط المستخدمة داخل التطبيق
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf

# إعدادات توليد أيقونة التطبيق
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"